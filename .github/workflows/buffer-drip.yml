name: Drip-publish from Buffer queue

# Twice daily. generate.yml adds one new post to Buffer's queue per day
# (addToQueue), and Buffer's own posting schedule decides when queued items
# actually go out to Facebook — which is how a backlog built up. This job
# pops the oldest still-queued post per configured channel and publishes it
# immediately (editPost, mode: shareNow), so the repo controls the drain
# rate directly: 2 posts/day, independent of Buffer's internal schedule.
on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Posts to publish per configured channel this run"
        required: false
        type: string
        default: "1"

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Publish oldest queued post(s) to Facebook
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ vars.BUFFER_PROFILE_IDS }}
        run: node scripts/buffer.mjs --drip ${{ inputs.count || '1' }}
