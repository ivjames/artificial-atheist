name: Generate article

# Runs on a schedule and on manual trigger. The commit's push fires the
# droplet's webhook, which pulls + rebuilds + serves the new post.
on:
  schedule:
    # Daily at 14:00 UTC. Adjust cadence here.
    # For two a day, add a second line, e.g.: - cron: "0 2 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # illustrate.mjs shells out to pngquant to shrink the committed PNGs (~80%).
      # Best-effort: if it were missing the images would just publish uncompressed.
      - name: Install pngquant
        run: sudo apt-get update && sudo apt-get install -y pngquant

      - name: Generate a new article
        env:
          AA_PROVIDER: ${{ vars.AA_PROVIDER }}
          AA_MODEL: ${{ vars.AA_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DO_INFERENCE_KEY: ${{ secrets.DO_INFERENCE_KEY }}
          # Enables the AI illustration step. Without it, illustrate.mjs skips
          # and posts fall back to the tessellation art. If the secret is unset
          # this is empty and the step degrades gracefully (no error).
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Auto-push the new article to Facebook via Buffer. Unset token ⇒ the
          # Buffer step is skipped (no error). BUFFER_PROFILE_IDS is optional:
          # when blank, every connected Facebook profile is targeted.
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ vars.BUFFER_PROFILE_IDS }}
        run: npm run generate

      - name: Commit if a new post was created
        run: |
          if [ -n "$(git status --porcelain src/posts)" ]; then
            git config user.name "Artificial Atheist Bot"
            git config user.email "bot@artificialatheist.com"
            # Stage the post AND its illustration together: illustrate.mjs writes
            # the PNG to src/images/posts and stamps an `image:` frontmatter line,
            # so committing only src/posts would push a reference to an image that
            # was never committed (broken hero on the live site).
            git add src/posts src/images/posts
            git commit -m "Add article: $(git status --porcelain src/posts | head -1 | sed 's/^...//')"
            git push
          else
            # generate.mjs retries on dedup collisions, so reaching here means it
            # gave up after several attempts (topic exhaustion) or generation
            # failed. Fail the job so the miss is visible (email/red run) instead
            # of the site silently going quiet for days.
            echo "::error::Generator produced no new post this run (dedup exhaustion or generation failure) — investigate."
            exit 1
          fi
