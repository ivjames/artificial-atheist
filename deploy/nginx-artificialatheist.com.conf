# Nginx server block for artificialatheist.com
# Serves the static Eleventy site AND proxies the Next.js app (the extended
# "AtheismIQ" app: quiz + debate chat + credits + article review) on one domain.
#
#   Location: /etc/nginx/sites-available/artificialatheist.com
#   Enable:   ln -s /etc/nginx/sites-available/artificialatheist.com /etc/nginx/sites-enabled/
#   Validate: sudo nginx -t   |   Reload: sudo systemctl reload nginx
#
# NOTE ON /admin: the existing Artificial Atheist admin dashboard (tools/admin,
# basic-auth) already owns /admin/. The Next.js article-review queue is therefore
# mounted at /review (NOT /admin) to avoid a collision. Do not add /admin to the
# proxied prefixes below.

upstream nextjs_backend {
  server 127.0.0.1:8060;
}

# WebSocket Connection header: "upgrade" for ws requests, "" (close) otherwise.
# Uniquely named so it can't clash with a $connection_upgrade another lab980
# vhost may already define in http{} scope.
map $http_upgrade $aa_connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  listen [::]:80;
  server_name artificialatheist.com www.artificialatheist.com;
  return 301 https://artificialatheist.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.artificialatheist.com;

  ssl_certificate /etc/letsencrypt/live/artificialatheist.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/artificialatheist.com/privkey.pem;

  # Redirect www → non-www canonical
  return 301 https://artificialatheist.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name artificialatheist.com;

  ssl_certificate /etc/letsencrypt/live/artificialatheist.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/artificialatheist.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Static Eleventy site root
  root /var/www/artificial-atheist/_site;
  index index.html;

  # === Next.js app (quiz + chat + credits + review) ===
  # One regex block covers every path segment the app owns, matched with OR
  # without a trailing slash (the app's internal redirects use no trailing
  # slash — e.g. redirect("/signup") — so trailing-slash-only prefixes would
  # 404 them). Keep this list in sync with the app's top-level routes.
  location ~ ^/(chat|age|signup|account|pricing|quiz|leaderboard|result|review|api|terms|privacy|unavailable|_next)(/|$) {
    proxy_pass http://nextjs_backend;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Region gate (GDPR sidestep). The app's middleware blocks EU/EEA+UK
    # visitors and reads the visitor country from this header. It comes from
    # the GeoIP2 module — see deploy/nginx-geoip2.conf and deploy/README.md.
    # LEFT COMMENTED so this vhost still loads before GeoIP2 is installed
    # (referencing an undefined $geoip2_country_code would fail `nginx -t`).
    # Uncomment AFTER installing the module + DB + the geoip2 snippet, then
    # `nginx -t && systemctl reload nginx`. Until it's set and the app's gate
    # is on, the gate fails CLOSED (blocks everyone) — which is why the go-live
    # runbook wires this before flipping CHAT_ENABLED=true.
    # proxy_set_header X-Country-Code $geoip2_country_code;

    # WebSocket upgrade (harmless for plain HTTP requests)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $aa_connection_upgrade;

    proxy_read_timeout 300s;
  }

  # === Static Eleventy pages (home, articles, /about, /faq, /debate, …) ===
  location / {
    try_files $uri $uri/ /index.html =404;
  }

  error_page 404 /404.html;
  location = /404.html {
    internal;
  }

  # Deny dotfiles and editor backup files
  location ~ /\. { deny all; }
  location ~ ~$  { deny all; }
}
