# GeoIP2 country lookup for the region gate (GDPR sidestep).
# -----------------------------------------------------------------------------
# The AtheismIQ chat app declines the chat surface to EU/EEA + UK visitors so it
# never collects special-category (religion/belief) conversation data from
# GDPR-jurisdiction data subjects. Its middleware reads the visitor's country
# from the `X-Country-Code` request header; this snippet is what produces that
# header value. The app's gate fails CLOSED, so if this is missing/misconfigured
# nobody can reach the chat (safe, but wire it before launch).
#
# INSTALL (Ubuntu/Debian droplet — Lab980):
#   1. Module + tools:
#        sudo apt-get update
#        sudo apt-get install -y libnginx-mod-http-geoip2 geoipupdate
#   2. Get the MaxMind GeoLite2-Country DB (free MaxMind account → license key):
#        put the key in /etc/GeoIP.conf (EditionIDs = GeoLite2-Country), then
#        sudo geoipupdate
#        → installs /usr/share/GeoIP/GeoLite2-Country.mmdb (auto-updates via
#          the geoipupdate cron the package installs).
#   3. Load the module in the MAIN context of /etc/nginx/nginx.conf (very top,
#      above the events/http blocks). The apt module package usually drops a
#      /etc/nginx/modules-enabled/ file that does this automatically; if not,
#      add manually:
#        load_module modules/ngx_http_geoip2_module.so;
#   4. Install THIS file into nginx's http{} scope:
#        sudo cp deploy/nginx-geoip2.conf /etc/nginx/conf.d/geoip2.conf
#      (/etc/nginx/conf.d/*.conf is included in http{} by the default nginx.conf)
#   5. Uncomment the `proxy_set_header X-Country-Code ...` line in
#      nginx-artificialatheist.com.conf.
#   6. sudo nginx -t && sudo systemctl reload nginx
#
# This vhost (nginx on the droplet) is the public edge — TLS terminates here and
# there is no CDN in front — so $remote_addr is the real client IP. If you ever
# put a CDN/proxy ahead of nginx, switch the source to the forwarded client IP.

geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
  auto_reload 60m;
  $geoip2_country_code source=$remote_addr country iso_code;
}
